name: argux-stack

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"


services:

  # Nginx web server to serve static assets and reverse proxy to the app
  nginx:
    image: nginx:latest
    container_name: argux_nginx
    hostname: argux_nginx
    links:
      - app
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app_network
    restart: always
    tty: true
    stdin_open: true
    logging: *default-logging

  # NodeJS for building assets with Vite
  node:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: production
    #command: sh -lc "npm update"
    tty: true
    stdin_open: true
    container_name: argux_node
    hostname: argux_node
    env_file:
      - .env
    networks:
      - app_network
    logging: *default-logging

  # PHP Application server running Laravel Octane with the FrankenPHP server
  app:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    container_name: argux_app
    hostname: argux_app
    working_dir: /app

    env_file:
      - .env
    command: >
      bash -lc "php artisan octane:start
      --server=frankenphp
      --host=127.0.0.1
      --port=8000
      --admin-port=2019
      --workers=${OCTANE_WORKERS:-auto}
      --max-requests=${OCTANE_MAX_REQUESTS:-500}
      --watch"
    expose:
      - "8000"
      - "2019"
    volumes:
      - ./:/app:delegated
      - vendor:/app/vendor
      - storage:/app/storage
      - bootstrap_cache:/app/bootstrap/cache
    networks:
      - app_network
    restart: always
    tty: true
    stdin_open: true
    logging: *default-logging


  # PHP CLI container for running artisan commands, tinker, etc. Useful for development and debugging.
  cli:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    container_name: argux_cli
    hostname: argux_cli
    working_dir: /app
    env_file:
      - .env
    command: ["bash", "-lc", "sleep infinity"]
    volumes:
      - ./:/app:delegated
      - vendor:/app/vendor
      - storage:/app/storage
      - bootstrap_cache:/app/bootstrap/cache
    networks:
      - app_network
    restart: no
    tty: true
    stdin_open: true
    logging: *default-logging

   # Redis Cache
  redis-cache:
    image: redis:8.2-alpine
    container_name: argux_redis_cache
    hostname: argux_redis_cache
    command: redis-server  --appendonly yes --requirepass ${REDIS_PASSWORD_CACHE}
    ports:
      - "${REDIS_PORT_CACHE}:6379"
    volumes:
      - redis_cache_data:/data
    networks:
      - app_network
    #restart: always
    tty: true
    stdin_open: true
    logging: *default-logging

  # Redis Queue
  redis-queue:
    image: redis:8.2-alpine
    container_name: argux_redis_queue
    hostname: argux_redis_queue
    command: redis-server  --appendonly yes --requirepass ${REDIS_PASSWORD_QUEUE:-cx54fdg@2}
    ports:
      - "${REDIS_PORT_QUEUE:-6388}:6379"
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6379", "-a", "${REDIS_PASSWORD_QUEUE:-cx54fdg@2}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app_network
    restart: always
    tty: true
    stdin_open: true
    logging: *default-logging

  # Redis Session
  redis-session:
    image: redis:8.2-alpine
    container_name: argux_redis_session
    hostname: argux_redis_session
    command: redis-server  --appendonly yes --requirepass ${REDIS_PASSWORD_SESSION:-cx54fdg@3}
    ports:
      - "${REDIS_PORT_SESSION:-6347}:6379"
    volumes:
      - redis_session_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6379", "-a", "${REDIS_PASSWORD_SESSION:-cx54fdg@3}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app_network
    restart: always
    tty: true
    stdin_open: true
    logging: *default-logging


  # Redis Broadcast
  redis-broadcast:
    image: redis:8.2-alpine
    container_name: argux_redis_broadcast
    hostname: argux_redis_broadcast
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD_BROADCAST:-cx54fdg@4}
    ports:
      - "${REDIS_PORT_BROADCAST:-6307}:6379"
    volumes:
      - redis_broadcast_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6379", "-a", "${REDIS_PASSWORD_BROADCAST:-cx54fdg@4}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - app_network
    #restart: always
    tty: true
    stdin_open: true
    logging: *default-logging

# Network and Volume definitions
networks:
  app_network:
    driver: bridge

volumes:
  vendor:
  storage:
  bootstrap_cache:
  node_modules:
  redis_broadcast_data:
  redis_cache_data:
  redis_data:
  redis_queue_data:
  redis_session_data:
