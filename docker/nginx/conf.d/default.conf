upstream argux_app {
    server app:8000;
}

upstream argux_reverb {
    server reverb:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    # WebSockets -> Reverb
    # This follows Laravel's recommended Nginx reverse proxy headers for Reverb. :contentReference[oaicite:5]{index=5}
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://argux_reverb;
    }

    location /app/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://argux_reverb;
    }

    # Everything else -> Laravel Octane (FrankenPHP)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Content-Security-Policy;
        proxy_pass http://argux_app;
    }
}