apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      host: clickhouse.argux.local
      port: 9000
      defaultDatabase: argux
      protocol: native
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
    editable: false
