# ============================================================
# argux — Grafana 11.x Configuration
# ============================================================

[server]
protocol = http
http_port = 3000
domain = grafana.argux.local
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
disable_gravatar = true
cookie_secure = true
cookie_samesite = strict

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/home.json
min_refresh_interval = 5s

[alerting]
enabled = true

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false

[users]
allow_sign_up = false
