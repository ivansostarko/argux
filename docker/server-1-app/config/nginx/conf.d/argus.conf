# ============================================================
# argux — Nginx Virtual Host Configuration
# ============================================================

upstream octane_backend {
    server laravel-octane:8000;
    keepalive 32;
}

upstream reverb_backend {
    server laravel-reverb:8080;
}

upstream mediamtx_hls {
    server mediamtx:8888;
}

# ── HTTPS Server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name argux.local;

    # SSL (Cloudflare Origin Certificate or step-ca issued)
    ssl_certificate     /etc/nginx/ssl/argux.crt;
    ssl_certificate_key /etc/nginx/ssl/argux.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── React SPA Static Files ───────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ── Laravel REST API ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://octane_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ── Sanctum CSRF Cookie ──────────────────────────────────
    location /sanctum/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://octane_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Laravel Reverb) ───────────────────────────
    location /app {
        proxy_pass http://reverb_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ── HLS Video Streams ────────────────────────────────────
    location /streams/ {
        # Auth validation via Laravel
        auth_request /api/v1/streams/validate;

        proxy_pass http://mediamtx_hls/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    # ── Laravel Horizon Dashboard (VPN only) ─────────────────
    location /horizon {
        allow 10.10.0.0/24;
        deny all;
        proxy_pass http://octane_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Laravel Pulse Dashboard (VPN only) ───────────────────
    location /pulse {
        allow 10.10.0.0/24;
        deny all;
        proxy_pass http://octane_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# ── HTTP → HTTPS Redirect ────────────────────────────────────
server {
    listen 80;
    server_name argux.local;

    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
