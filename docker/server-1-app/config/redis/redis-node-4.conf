# ============================================================
# argux — Redis 8 Cluster Node 1 (Master)
# ============================================================

# Network
bind 0.0.0.0
port 6379
protected-mode yes
requirepass CHANGE_ME_REDIS_PASSWORD
masterauth CHANGE_ME_REDIS_PASSWORD

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-hostname redis-node-4

# Persistence (RDB + AOF)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
dir /data

# Memory
maxmemory 4gb
maxmemory-policy allkeys-lru

# Performance
tcp-backlog 511
timeout 300
tcp-keepalive 300
hz 10
dynamic-hz yes

# Logging
loglevel notice
logfile ""

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
