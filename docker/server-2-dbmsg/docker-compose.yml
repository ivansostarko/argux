# ============================================================
# argux Server 2 — Database & Messaging Server
# ============================================================
# Services: PostgreSQL 17, MySQL 9.1, ClickHouse 25,
#           Kafka 4.0 (3 KRaft brokers), Kafka Connect,
#           Karapace Schema Registry, Typesense 28 (3 nodes),
#           Prometheus exporters
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-50m}"
    max-file: "${LOG_MAX_FILE:-5}"
    tag: "{{.Name}}"

x-restart: &default-restart
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

services:

  # ════════════════════════════════════════════════════════════
  # PostgreSQL 17 + PostGIS 3.5
  # ════════════════════════════════════════════════════════════
  postgres:
    image: postgis/postgis:17-3.5
    container_name: argux-postgres
    <<: *default-restart
    logging: *default-logging
    ports:
      - "5432:5432"
    volumes:
      - argux-postgres-data:/var/lib/postgresql/data
      - argux-postgres-wal:/var/lib/postgresql/wal
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./config/postgres/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-argux}
      POSTGRES_USER: ${POSTGRES_USER:-argux_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argux_app} -d ${POSTGRES_DB:-argux}"]
    shm_size: "2g"
    networks:
      argux-dbmsg-net:
        aliases:
          - postgres.argux.local

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: argux-postgres-exporter
    <<: *default-restart
    logging: *default-logging
    expose:
      - "9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-argux_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-argux}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      argux-dbmsg-net:

  # ════════════════════════════════════════════════════════════
  # MySQL 9.1
  # ════════════════════════════════════════════════════════════
  mysql:
    image: mysql:9.1
    container_name: argux-mysql
    <<: *default-restart
    logging: *default-logging
    ports:
      - "3306:3306"
    volumes:
      - argux-mysql-data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/argux.cnf:ro
      - ./config/mysql/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-argux_logs}
      MYSQL_USER: ${MYSQL_USER:-argux_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
    networks:
      argux-dbmsg-net:
        aliases:
          - mysql.argux.local

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: argux-mysql-exporter
    <<: *default-restart
    logging: *default-logging
    expose:
      - "9104"
    environment:
      DATA_SOURCE_NAME: "root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      argux-dbmsg-net:

  # ════════════════════════════════════════════════════════════
  # ClickHouse 25
  # ════════════════════════════════════════════════════════════
  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    container_name: argux-clickhouse
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - argux-clickhouse-data:/var/lib/clickhouse
      - argux-clickhouse-logs:/var/log/clickhouse-server
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.d/argux.xml:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/argux.xml:ro
      - ./config/clickhouse/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-argux}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-argux_app}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      argux-dbmsg-net:
        aliases:
          - clickhouse.argux.local

  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    container_name: argux-clickhouse-exporter
    <<: *default-restart
    logging: *default-logging
    expose:
      - "9116"
    command: ["-scrape_uri=http://clickhouse:8123/"]
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      argux-dbmsg-net:

  # ════════════════════════════════════════════════════════════
  # Apache Kafka 4.0 — KRaft Mode (3 Brokers)
  # ════════════════════════════════════════════════════════════
  kafka-1:
    image: apache/kafka:4.0.0
    container_name: argux-kafka-1
    <<: *default-restart
    logging: *default-logging
    ports:
      - "9092:9092"
    volumes:
      - argux-kafka-data-1:/var/lib/kafka/data
      - argux-kafka-logs-1:/opt/kafka/logs
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx4G -Xms4G}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion"]
      start_period: 90s
    networks:
      argux-dbmsg-net:
        aliases:
          - kafka-1.argux.local

  kafka-2:
    image: apache/kafka:4.0.0
    container_name: argux-kafka-2
    <<: *default-restart
    logging: *default-logging
    ports:
      - "9093:9092"
    volumes:
      - argux-kafka-data-2:/var/lib/kafka/data
      - argux-kafka-logs-2:/opt/kafka/logs
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx4G -Xms4G}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion"]
      start_period: 90s
    networks:
      argux-dbmsg-net:
        aliases:
          - kafka-2.argux.local

  kafka-3:
    image: apache/kafka:4.0.0
    container_name: argux-kafka-3
    <<: *default-restart
    logging: *default-logging
    ports:
      - "9094:9092"
    volumes:
      - argux-kafka-data-3:/var/lib/kafka/data
      - argux-kafka-logs-3:/opt/kafka/logs
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx4G -Xms4G}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion"]
      start_period: 90s
    networks:
      argux-dbmsg-net:
        aliases:
          - kafka-3.argux.local

  # ── Kafka Topic Initialization ─────────────────────────────
  kafka-init:
    image: apache/kafka:4.0.0
    container_name: argux-kafka-init
    restart: "no"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating argux Kafka topics..."
        KAFKA="/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092"

        $$KAFKA --create --if-not-exists --topic argux.location-pings   --partitions 6 --replication-factor 3 --config retention.ms=604800000
        $$KAFKA --create --if-not-exists --topic argux.alert-events     --partitions 3 --replication-factor 3 --config retention.ms=1209600000
        $$KAFKA --create --if-not-exists --topic argux.media-uploads    --partitions 3 --replication-factor 3 --config retention.ms=259200000
        $$KAFKA --create --if-not-exists --topic argux.face-captures    --partitions 3 --replication-factor 3 --config retention.ms=259200000
        $$KAFKA --create --if-not-exists --topic argux.lpr-captures     --partitions 3 --replication-factor 3 --config retention.ms=604800000
        $$KAFKA --create --if-not-exists --topic argux.audio-captures   --partitions 3 --replication-factor 3 --config retention.ms=259200000
        $$KAFKA --create --if-not-exists --topic argux.voice-captures   --partitions 3 --replication-factor 3 --config retention.ms=259200000
        $$KAFKA --create --if-not-exists --topic argux.ai-tasks         --partitions 6 --replication-factor 3 --config retention.ms=86400000
        $$KAFKA --create --if-not-exists --topic argux.ai-results       --partitions 3 --replication-factor 3 --config retention.ms=86400000
        $$KAFKA --create --if-not-exists --topic argux.translation-tasks --partitions 3 --replication-factor 3 --config retention.ms=86400000
        $$KAFKA --create --if-not-exists --topic argux.audit-log        --partitions 3 --replication-factor 3 --config retention.ms=2592000000
        $$KAFKA --create --if-not-exists --topic argux.video-events     --partitions 3 --replication-factor 3 --config retention.ms=604800000

        echo "All argux topics created."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list
    networks:
      argux-dbmsg-net:

  # ── Kafka Exporter ─────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: argux-kafka-exporter
    <<: *default-restart
    logging: *default-logging
    expose:
      - "9308"
    command: ["--kafka.server=kafka-1:9092", "--kafka.server=kafka-2:9092", "--kafka.server=kafka-3:9092"]
    depends_on:
      kafka-1:
        condition: service_healthy
    networks:
      argux-dbmsg-net:

  # ════════════════════════════════════════════════════════════
  # Kafka Connect
  # ════════════════════════════════════════════════════════════
  kafka-connect:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.kafka-connect
    container_name: argux-kafka-connect
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8083:8083"
    volumes:
      - argux-kafka-connect-plugins:/opt/kafka/connect-plugins
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: argux-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: _argux-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _argux-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _argux-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /opt/kafka/connect-plugins
    depends_on:
      kafka-1:
        condition: service_healthy
    networks:
      argux-dbmsg-net:
        aliases:
          - kafka-connect.argux.local

  # ════════════════════════════════════════════════════════════
  # Karapace — Schema Registry (Apache 2.0)
  # ════════════════════════════════════════════════════════════
  karapace:
    image: ghcr.io/aiven-open/karapace:3.15.0
    container_name: argux-karapace
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8081:8081"
    environment:
      KARAPACE_ADVERTISED_HOSTNAME: karapace
      KARAPACE_BOOTSTRAP_URI: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KARAPACE_PORT: 8081
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_CLIENT_ID: argux-karapace
      KARAPACE_GROUP_ID: argux-schema-registry
      KARAPACE_MASTER_ELIGIBILITY: "true"
      KARAPACE_TOPIC_NAME: _argux-schemas
    depends_on:
      kafka-1:
        condition: service_healthy
    networks:
      argux-dbmsg-net:
        aliases:
          - karapace.argux.local

  # ════════════════════════════════════════════════════════════
  # Typesense 28 — Search Cluster (3 nodes)
  # ════════════════════════════════════════════════════════════
  typesense-1:
    image: typesense/typesense:28.0
    container_name: argux-typesense-1
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8108:8108"
    volumes:
      - argux-typesense-data-1:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_PORT: 8108
      TYPESENSE_PEERING_PORT: 8107
      TYPESENSE_NODES: "typesense-1:8107:8108,typesense-2:8107:8108,typesense-3:8107:8108"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
    networks:
      argux-dbmsg-net:
        aliases:
          - typesense-1.argux.local

  typesense-2:
    image: typesense/typesense:28.0
    container_name: argux-typesense-2
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8109:8108"
    volumes:
      - argux-typesense-data-2:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_PORT: 8108
      TYPESENSE_PEERING_PORT: 8107
      TYPESENSE_NODES: "typesense-1:8107:8108,typesense-2:8107:8108,typesense-3:8107:8108"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
    networks:
      argux-dbmsg-net:
        aliases:
          - typesense-2.argux.local

  typesense-3:
    image: typesense/typesense:28.0
    container_name: argux-typesense-3
    <<: *default-restart
    logging: *default-logging
    ports:
      - "8110:8108"
    volumes:
      - argux-typesense-data-3:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_PORT: 8108
      TYPESENSE_PEERING_PORT: 8107
      TYPESENSE_NODES: "typesense-1:8107:8108,typesense-2:8107:8108,typesense-3:8107:8108"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
    networks:
      argux-dbmsg-net:
        aliases:
          - typesense-3.argux.local

  # ── Node Exporter ──────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: argux-dbmsg-node-exporter
    <<: *default-restart
    logging: *default-logging
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      argux-dbmsg-net:

# ══════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════
networks:
  argux-dbmsg-net:
    name: argux-dbmsg-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

# ══════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════
volumes:
  argux-postgres-data:
    name: argux-postgres-data
  argux-postgres-wal:
    name: argux-postgres-wal

  argux-mysql-data:
    name: argux-mysql-data

  argux-clickhouse-data:
    name: argux-clickhouse-data
  argux-clickhouse-logs:
    name: argux-clickhouse-logs

  argux-kafka-data-1:
    name: argux-kafka-data-1
  argux-kafka-data-2:
    name: argux-kafka-data-2
  argux-kafka-data-3:
    name: argux-kafka-data-3
  argux-kafka-logs-1:
    name: argux-kafka-logs-1
  argux-kafka-logs-2:
    name: argux-kafka-logs-2
  argux-kafka-logs-3:
    name: argux-kafka-logs-3

  argux-kafka-connect-plugins:
    name: argux-kafka-connect-plugins

  argux-typesense-data-1:
    name: argux-typesense-data-1
  argux-typesense-data-2:
    name: argux-typesense-data-2
  argux-typesense-data-3:
    name: argux-typesense-data-3
